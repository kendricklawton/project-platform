apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rustfs
  namespace: argocd
  labels:
    platform.io/managed-by: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    # Uses the official RustFS helm repository
    repoURL: "https://rustfs.github.io/helm"
    chart: rustfs
    targetRevision: "main" # Replace with specific version tag once stabilized
    helm:
      values: |
        replicaCount: 1 # Single node mode for now, scale up as needed
        persistence:
          enabled: true
          size: 50Gi
        # Set your root credentials
        rootUser: "admin"
        rootPassword: "your-secure-rustfs-password"
        # Optional: Enable the modern Next.js management console
        console:
          enabled: true
  destination:
    server: "https://kubernetes.default.svc"
    namespace: platform-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
