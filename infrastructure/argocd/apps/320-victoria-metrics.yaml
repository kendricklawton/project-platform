apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoria-metrics
  namespace: argocd
  labels:
    platform.io/managed-by: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: "https://victoriametrics.github.io/helm-charts"
    chart: victoria-metrics-k8s-stack
    targetRevision: "0.14.0"
    helm:
      values: |
        # Single-node deployment — no HA needed for personal platform
        vmsingle:
          enabled: true
          spec:
            retentionPeriod: "30d"
            storage:
              resources:
                requests:
                  storage: 20Gi
        # Disable cluster components
        vmcluster:
          enabled: false
        vmagent:
          enabled: true
          spec:
            scrapeInterval: 30s
        vmalert:
          enabled: false
        alertmanager:
          enabled: false
        # Built-in scraping for k8s components
        kubelet:
          enabled: true
        kubeApiServer:
          enabled: true
        kubeControllerManager:
          enabled: true
        kubeScheduler:
          enabled: true
        kubeEtcd:
          enabled: true
          endpoints: ["127.0.0.1"]
          service:
            port: 2381
            targetPort: 2381
        # Grafana managed separately
        grafana:
          enabled: false
  destination:
    server: "https://kubernetes.default.svc"
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
