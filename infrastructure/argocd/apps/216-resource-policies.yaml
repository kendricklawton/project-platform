# =============================================================================
# cnpg-system — PostgreSQL is memory-hungry; give it room
# =============================================================================

---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  namespace: cnpg-system
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: "100m"
        memory: "256Mi"
      default:
        cpu: "2"
        memory: "2Gi"
      max:
        cpu: "4"
        memory: "8Gi"
    - type: PersistentVolumeClaim
      max:
        storage: "100Gi"

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: namespace-quota
  namespace: cnpg-system
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  hard:
    requests.cpu: "4"
    requests.memory: "8Gi"
    limits.cpu: "8"
    limits.memory: "16Gi"
    pods: "15"
    services: "10"
    persistentvolumeclaims: "15"
