# -----------------------------------------------------------------------------
# RUNTIME CLASSES
# gVisor (runsc) is pre-installed on every node via Packer.
# The containerd shim is registered at /etc/containerd/config.toml.
# This RuntimeClass makes it selectable by pods via runtimeClassName: gvisor.
#
# Use for: any workload running untrusted or user-supplied code.
# The gVisor kernel intercepts all system calls — compromised container code
# cannot reach the host kernel directly.
#
# CNPA/CNPE relevance: demonstrates understanding of container runtime
# isolation layers (OCI → containerd → shim → runsc → gVisor kernel).
# -----------------------------------------------------------------------------
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: gvisor
  annotations:
    argocd.argoproj.io/sync-wave: "0"
handler: runsc
scheduling:
  nodeClassification:
    tolerations: []
