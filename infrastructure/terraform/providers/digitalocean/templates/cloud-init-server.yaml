#cloud-config
hostname: ${hostname}
manage_etc_hosts: true

write_files:
  # NETPLAN CONFIGURATION
  # eth0 = public interface (DHCP from DO)
  # eth1 = VPC private interface (DHCP from DO VPC)
  - path: /etc/netplan/60-custom.yaml
    permissions: "0600"
    content: |
      network:
        version: 2
        ethernets:
          eth0:
            dhcp4: true
            nameservers:
              addresses: [1.1.1.1, 8.8.8.8]
          eth1:
            dhcp4: true
            dhcp4-overrides:
              route-metric: 200

  # KUBERNETES AUDIT POLICY
  - path: /etc/kubernetes/audit-policy.yaml
    permissions: "0600"
    content: |
      apiVersion: audit.k8s.io/v1
      kind: Policy
      rules:
      - level: Metadata

  # KUBEADM CONFIG — init vs. join distinction handled in bootstrap script
  - path: /etc/kubernetes/kubeadm-config.yaml
    permissions: "0600"
    owner: root:root
    content: |
%{ if is_init_node ~}
      ---
      apiVersion: kubeadm.k8s.io/v1beta4
      kind: InitConfiguration
      bootstrapTokens:
        - token: "${kubeadm_token}"
          ttl: "0"
      certificateKey: "${kubeadm_cert_key}"
      nodeRegistration:
        name: "${hostname}"
        criSocket: "unix:///run/containerd/containerd.sock"
        kubeletExtraArgs:
          - name: cloud-provider
            value: "external"
%{ else ~}
      ---
      apiVersion: kubeadm.k8s.io/v1beta4
      kind: JoinConfiguration
      discovery:
        bootstrapToken:
          apiServerEndpoint: "${kubernetes_api_lb_ip}:6443"
          token: "${kubeadm_token}"
          unsafeSkipCAVerification: true
      nodeRegistration:
        name: "${hostname}"
        criSocket: "unix:///run/containerd/containerd.sock"
        kubeletExtraArgs:
          - name: cloud-provider
            value: "external"
      controlPlane:
        certificateKey: "${kubeadm_cert_key}"
%{ endif ~}
      ---
      apiVersion: kubeadm.k8s.io/v1beta4
      kind: ClusterConfiguration
      controlPlaneEndpoint: "${kubernetes_api_lb_ip}:6443"
      apiServer:
        extraArgs:
          - name: audit-policy-file
            value: /etc/kubernetes/audit-policy.yaml
          - name: audit-log-path
            value: /var/log/kubernetes/audit.log
          - name: audit-log-maxage
            value: "7"
          - name: audit-log-maxbackup
            value: "3"
          - name: audit-log-maxsize
            value: "10"
        extraVolumes:
          - name: audit-policy
            hostPath: /etc/kubernetes/audit-policy.yaml
            mountPath: /etc/kubernetes/audit-policy.yaml
            readOnly: true
          - name: audit-log
            hostPath: /var/log/kubernetes
            mountPath: /var/log/kubernetes
            readOnly: false
        certSANs:
          - "${hostname}"
          - "${kubernetes_api_lb_ip}"
          - "127.0.0.1"
          # Tailscale IP and private VPC IP appended at runtime by bootstrap script
      networking:
        podSubnet: "10.244.0.0/16"
        serviceSubnet: "10.96.0.0/12"
      etcd:
        local:
          dataDir: /var/lib/etcd
      ---
      apiVersion: kubelet.config.k8s.io/v1beta1
      kind: KubeletConfiguration
      cgroupDriver: systemd
      containerRuntimeEndpoint: "unix:///run/containerd/containerd.sock"

  # DO CCM + CSI SECRET: applied by bootstrap script after kubeadm init
  - path: /etc/kubernetes/do-secret.yaml
    permissions: "0600"
    owner: root:root
    content: |
      apiVersion: v1
      kind: Secret
      metadata:
        name: digitalocean
        namespace: kube-system
      stringData:
        access-token: "${do_token}"

  # ARGOCD ROOT APP: applied by bootstrap script after ArgoCD is running
  - path: /etc/kubernetes/root-app.yaml
    permissions: "0644"
    owner: root:root
    content: |
      apiVersion: argoproj.io/v1alpha1
      kind: Application
      metadata:
        name: root-app
        namespace: argocd
      spec:
        project: default
        source:
          repoURL: ${git_repo_url}
          targetRevision: HEAD
          path: infrastructure/argocd/apps
        destination:
          server: https://kubernetes.default.svc
          namespace: argocd
        syncPolicy:
          automated:
            prune: true
            selfHeal: true

  # CONTROL PLANE BOOTSTRAP SCRIPT
  - path: /usr/local/bin/kubeadm-bootstrap.sh
    permissions: "0700"
    owner: root:root
    content: |
      #!/bin/bash
      set -euo pipefail
      LOG="/var/log/k8s-bootstrap.log"
      exec > >(tee -a "$LOG") 2>&1
      echo "=== K8s Control Plane Bootstrap Started at $(date) ==="

      # -------------------------------------------------------
      # 1. SDN routing — route outbound through NAT gateway on eth1
      # -------------------------------------------------------
      echo "[Bootstrap] Setting default route via NAT gateway ${network_gateway}..."
      ip route replace default via ${network_gateway} dev eth1 onlink || true

      # -------------------------------------------------------
      # 2. Get private VPC IP (eth1) for kubeadm advertise address
      # -------------------------------------------------------
      echo "[Bootstrap] Detecting VPC private IP on eth1..."
      PRIVATE_IP=""
      for i in $(seq 1 15); do
        PRIVATE_IP=$(ip -4 addr show eth1 2>/dev/null | grep -oP '(?<=inet\s)\d+(\.\d+){3}' | head -1 || true)
        if [ -n "$PRIVATE_IP" ]; then
          echo "[Bootstrap] VPC private IP: $PRIVATE_IP"
          break
        fi
        echo "[Bootstrap] eth1 not ready yet (attempt $i/15)..."
        sleep 3
      done
      [ -z "$PRIVATE_IP" ] && echo "[WARN] Could not detect eth1 IP — using eth0" && PRIVATE_IP=$(ip -4 addr show eth0 | grep -oP '(?<=inet\s)\d+(\.\d+){3}' | head -1)

      # -------------------------------------------------------
      # 3. Get DO droplet ID from metadata
      # -------------------------------------------------------
      echo "[Bootstrap] Fetching DO droplet ID from metadata..."
      DO_ID=""
      for i in $(seq 1 30); do
        DO_ID=$(curl -sf -m 3 http://169.254.169.254/metadata/v1/id 2>/dev/null || true)
        if [ -n "$DO_ID" ]; then
          echo "[Bootstrap] DO droplet ID: $DO_ID"
          break
        fi
        [ "$i" -eq 30 ] && echo "[ERROR] Metadata service unreachable — proceeding without droplet ID"
        sleep 2
      done

      # -------------------------------------------------------
      # 4. Wait for Tailscale IP
      # -------------------------------------------------------
      echo "[Bootstrap] Waiting for Tailscale IP..."
      TS_IP=""
      for i in $(seq 1 30); do
        TS_IP=$(tailscale ip -4 2>/dev/null || true)
        if [ -n "$TS_IP" ]; then
          echo "[Bootstrap] Tailscale IP acquired: $TS_IP"
          break
        fi
        echo "[Bootstrap] Tailscale not ready yet (attempt $i/30)..."
        sleep 5
      done
      [ -z "$TS_IP" ] && echo "[WARN] Tailscale IP not available — certSANs will be incomplete"

      # -------------------------------------------------------
      # 5. Patch kubeadm config with runtime values
      # -------------------------------------------------------
      echo "[Bootstrap] Patching kubeadm config..."
      mkdir -p /var/log/kubernetes

      # Append private IP and Tailscale IP to certSANs
      sed -i "/127\.0\.0\.1$/a\\          - \"$PRIVATE_IP\"" /etc/kubernetes/kubeadm-config.yaml
      if [ -n "$TS_IP" ]; then
        sed -i "/127\.0\.0\.1$/a\\          - \"$TS_IP\"" /etc/kubernetes/kubeadm-config.yaml
      fi

%{ if is_init_node ~}
      # Set provider-id via kubelet extra-args patch (DO uses digitalocean://ID)
      sed -i "s|value: \"external\"|value: \"external\"\n          - name: provider-id\n            value: \"digitalocean://$DO_ID\"|" /etc/kubernetes/kubeadm-config.yaml

      # -------------------------------------------------------
      # 6a. kubeadm INIT (cp-01 only)
      # -------------------------------------------------------
      echo "[Bootstrap] Running kubeadm init..."
      kubeadm init \
        --config /etc/kubernetes/kubeadm-config.yaml \
        --skip-phases=addon/kube-proxy \
        --upload-certs \
        --ignore-preflight-errors=NumCPU

      export KUBECONFIG=/etc/kubernetes/admin.conf
      mkdir -p /root/.kube
      cp /etc/kubernetes/admin.conf /root/.kube/config

      # -------------------------------------------------------
      # 6. Install Cilium (replaces kube-proxy)
      # -------------------------------------------------------
      echo "[Bootstrap] Installing Cilium ${cilium_version}..."
      helm repo add cilium https://helm.cilium.io/ --force-update
      helm install cilium cilium/cilium \
        --version "${cilium_version}" \
        --namespace kube-system \
        --set k8sServiceHost="${kubernetes_api_lb_ip}" \
        --set k8sServicePort=6443 \
        --set kubeProxyReplacement=true \
        --set mtu=${cluster_mtu} \
        --set routingMode=native \
        --set autoDirectNodeRoutes=false \
        --set ipv4NativeRoutingCIDR="10.0.0.0/20" \
        --set endpointRoutes.enabled=true \
        --set ipam.mode=kubernetes \
        --set operator.replicas=1 \
        --set hubble.enabled=true \
        --set hubble.relay.enabled=true \
        --set hubble.ui.enabled=false

      echo "[Bootstrap] Waiting for Cilium to be ready..."
      kubectl rollout status daemonset/cilium -n kube-system --timeout=300s

      # -------------------------------------------------------
      # 7. Apply DO cloud secret (required by CCM + CSI)
      # -------------------------------------------------------
      echo "[Bootstrap] Applying DigitalOcean cloud secret..."
      kubectl apply -f /etc/kubernetes/do-secret.yaml

      # -------------------------------------------------------
      # 8. Install DigitalOcean CCM
      # -------------------------------------------------------
      echo "[Bootstrap] Installing DigitalOcean CCM ${ccm_version}..."
      helm repo add digitalocean https://digitalocean.github.io/digitalocean-cloud-controller-manager/ --force-update
      helm install digitalocean-cloud-controller-manager digitalocean/digitalocean-cloud-controller-manager \
        --version "${ccm_version}" \
        --namespace kube-system

      # -------------------------------------------------------
      # 9. Install DigitalOcean CSI
      # -------------------------------------------------------
      echo "[Bootstrap] Installing DigitalOcean CSI ${csi_version}..."
      helm repo add csi-digitalocean https://digitalocean.github.io/csi-digitalocean/ --force-update
      helm install csi-digitalocean csi-digitalocean/digitalocean \
        --version "${csi_version}" \
        --namespace kube-system

      # -------------------------------------------------------
      # 10. Install Sealed Secrets
      # -------------------------------------------------------
      echo "[Bootstrap] Installing Sealed Secrets ${sealed_secrets_version}..."
      helm repo add sealed-secrets https://bitnami-labs.github.io/sealed-secrets --force-update
      helm install sealed-secrets sealed-secrets/sealed-secrets \
        --version "${sealed_secrets_version}" \
        --namespace kube-system \
        --set fullnameOverride=sealed-secrets

      # -------------------------------------------------------
      # 11. Install ArgoCD
      # -------------------------------------------------------
      echo "[Bootstrap] Installing ArgoCD ${argocd_version}..."
      helm repo add argo https://argoproj.github.io/argo-helm --force-update
      kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
      helm install argocd argo/argo-cd \
        --version "${argocd_version}" \
        --namespace argocd \
        --set server.insecure=true

      echo "[Bootstrap] Waiting for ArgoCD server to be ready..."
      kubectl rollout status deployment/argocd-server -n argocd --timeout=300s

      # -------------------------------------------------------
      # 12. Apply root ArgoCD app
      # -------------------------------------------------------
      echo "[Bootstrap] Applying ArgoCD root application..."
      kubectl apply -f /etc/kubernetes/root-app.yaml

%{ else ~}
      # -------------------------------------------------------
      # 6b. kubeadm JOIN (cp-02+ only)
      # -------------------------------------------------------
      echo "[Bootstrap] Waiting for API server at ${kubernetes_api_lb_ip}:6443..."
      for i in $(seq 1 60); do
        if curl -sk --connect-timeout 3 "https://${kubernetes_api_lb_ip}:6443/healthz" >/dev/null 2>&1; then
          echo "[Bootstrap] API server is reachable"
          break
        fi
        [ "$i" -eq 60 ] && echo "[ERROR] API server not reachable after 5 minutes — joining anyway"
        sleep 5
      done

      echo "[Bootstrap] Running kubeadm join (control plane)..."
      kubeadm join --config /etc/kubernetes/kubeadm-config.yaml \
        --ignore-preflight-errors=NumCPU

      export KUBECONFIG=/etc/kubernetes/admin.conf
      mkdir -p /root/.kube
      cp /etc/kubernetes/admin.conf /root/.kube/config
%{ endif ~}

      # -------------------------------------------------------
      # Final: Verify cluster health
      # -------------------------------------------------------
      echo "[Bootstrap] Verifying cluster health..."
      for i in $(seq 1 20); do
        if kubectl get nodes 2>/dev/null | grep -q "${hostname}"; then
          echo "=== K8s Control Plane Bootstrap Complete at $(date) ==="
          kubectl get nodes
          exit 0
        fi
        sleep 5
      done
      echo "[ERROR] Node ${hostname} not found in cluster after bootstrap"
      journalctl -u kubelet --no-pager --since "5min ago" | tail -50
      exit 1

runcmd:
  - netplan generate
  - netplan apply
  - sleep 5
  - systemctl restart systemd-resolved || true

  # Join Tailscale — wait for socket, then retry
  - |
    LOG="/var/log/tailscale-join.log"
    echo "Waiting for tailscaled socket..." >> $LOG
    for i in $(seq 1 24); do
      [ -S /run/tailscale/tailscaled.sock ] && break
      sleep 5
    done
    echo "tailscaled socket ready, joining..." >> $LOG
    until tailscale up \
      --authkey=${tailscale_auth_cp_key} \
      --ssh --hostname=${hostname} --advertise-tags="tag:k8s-cp" --reset >> $LOG 2>&1; do
      sleep 5
    done
    echo "Tailscale joined successfully" >> $LOG

  - /usr/local/bin/kubeadm-bootstrap.sh
