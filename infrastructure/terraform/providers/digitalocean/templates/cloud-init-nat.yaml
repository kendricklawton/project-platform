#cloud-config
hostname: ${hostname}
manage_etc_hosts: true

write_files:
  # eth0 = public WAN (default route, MASQUERADE source)
  # eth1 = VPC private (receives traffic from cluster nodes)
  - path: /etc/netplan/60-private-net.yaml
    permissions: "0600"
    content: |
      network:
        version: 2
        ethernets:
          eth0:
            dhcp4: true
            nameservers:
              addresses: [1.1.1.1, 8.8.8.8]
          eth1:
            dhcp4: true
            dhcp4-overrides:
              use-routes: false
            routes:
              - to: 10.0.0.0/20
                scope: link

runcmd:
  # 1. Apply netplan
  - netplan generate
  - netplan apply
  - sleep 5

  # 2. Install iptables-persistent (needed for netfilter-persistent save)
  - |
    export DEBIAN_FRONTEND=noninteractive
    echo iptables-persistent iptables-persistent/autosave_v4 boolean true | debconf-set-selections
    echo iptables-persistent iptables-persistent/autosave_v6 boolean true | debconf-set-selections
    apt-get update -y && apt-get install -y iptables-persistent

  # 3. Enable IP forwarding
  - sysctl -w net.ipv4.ip_forward=1
  - systemctl stop ufw || true
  - systemctl disable ufw || true

  # 4. Set up NAT — MASQUERADE outbound on eth0 (public WAN)
  - |
    iptables -F FORWARD
    iptables -t nat -F POSTROUTING
    iptables -A FORWARD -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT
    iptables -A FORWARD -s 10.0.0.0/20 -j ACCEPT
    iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
    netfilter-persistent save
    echo "[NAT] iptables rules applied" >> /var/log/nat-setup.log

  # 5. Join Tailscale
  - |
    LOG="/var/log/tailscale-join.log"
    echo "Waiting for tailscaled socket..." >> $LOG
    for i in $(seq 1 24); do
      [ -S /run/tailscale/tailscaled.sock ] && break
      sleep 5
    done
    echo "tailscaled socket ready, joining..." >> $LOG
    until tailscale up \
      --authkey=${tailscale_auth_nat_key} \
      --ssh --hostname=${hostname} --advertise-tags="tag:nat" --reset >> $LOG 2>&1; do
      sleep 5
    done
    echo "Tailscale joined successfully" >> $LOG
